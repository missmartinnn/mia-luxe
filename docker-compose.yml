# /docker-compose.yml
version: '3.8'

services:
  # 1. The Next.js Web Frontend & API
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # This tells Prisma to talk to the 'db' container below, not localhost
      - DATABASE_URL=postgresql://postgres:mialuxe_secure@db:5432/mialuxe_db?schema=public
    depends_on:
      - db
    restart: unless-stopped

  # 2. The PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mialuxe_secure
      - POSTGRES_DB=mialuxe_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  # This ensures your database isn't wiped out if the container restarts
  pgdata: